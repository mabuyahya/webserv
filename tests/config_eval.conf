server {
    listen 127.0.0.1:18080;
    server_name config-a.local;
    root ./tests/config_eval/site_a;
    index index.html;
    allowed_methods GET;
    client_max_body_size 8;
    error_page 404 ./tests/config_eval/custom_errors/404.html;

    location / {
        root ./tests/config_eval/site_a;
        index index.html;
        allowed_methods GET;
    }

    location /dir {
        root ./tests/config_eval/site_a/dir;
        index default.html;
        allowed_methods GET;
    }

    location /uploads {
        root ./tests/config_eval/uploads;
        index index.html;
        allowed_methods GET POST DELETE;
        upload_dir ./tests/config_eval/uploads;
        client_max_body_size 8;
    }

    location /delete-zone {
        root ./tests/config_eval/site_a;
        index index.html;
        allowed_methods GET DELETE;
    }
}

server {
    listen 127.0.0.1:18081;
    server_name config-b.local;
    root ./tests/config_eval/site_b;
    index index.html;
    allowed_methods GET;

    location / {
        root ./tests/config_eval/site_b;
        index index.html;
        allowed_methods GET;
    }
}
