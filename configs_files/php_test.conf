# Optional PHP CGI test: requires php-cgi at /usr/bin/php-cgi.
server {
    listen 127.0.0.1:8082;
    server_name php-test.local;
    root ./servers/evaluation/php;
    index info.php;
    allowed_methods GET POST;
    client_max_body_size 1048576;

    location / {
        root ./servers/evaluation/php;
        index info.php;
        allowed_methods GET POST;
        cgi .php /usr/bin/php-cgi;
    }
}
