server {
        listen 127.0.0.1:8080;
        server_name test.com;
        root ./servers/server1/html;
        allowed_methods GET POST DELETE;
        autoindex off;
        error_page 404 /errors/404.html;
        error_page 500 /errors/500.html;
        client_max_body_size 10485760;
        
        location / { 
            root ./servers/server1/html;
            index index.html;
        }
        
        location /images {
            index index.html test.py;
            allowed_methods GET;
            autoindex on;
            return 301 /images/photos;
        }
        
        location /images/photos {
            index index.html test.py;
            allowed_methods GET;
            autoindex on;
            cgi .py /usr/bin/python3;
            upload_dir ./servers/server1/uploads;
        }
}

server {
        listen 8081;
        server_name example.com;
        root ./servers/server2;
        autoindex on;
        
        location / {
            index index.html;
        }
}
