# Primary evaluation site: http://127.0.0.1:8080
server {
    listen 127.0.0.1:8080;
    server_name evaluation.local;
    root ./servers/evaluation/public;
    index index.html;
    allowed_methods GET;
    autoindex off;
    client_max_body_size 1048576;
    error_page 403 /errors/403.html;
    error_page 404 /errors/404.html;
    error_page 405 /errors/405.html;
    error_page 413 /errors/413.html;
    error_page 500 /errors/500.html;

    location / {
        root ./servers/evaluation/public;
        index index.html;
        allowed_methods GET;
    }

    location /assets {
        root ./servers/evaluation/public/assets;
        index index.html;
        allowed_methods GET;
    }

    location /errors {
        root ./servers/evaluation/errors;
        index 404.html;
        allowed_methods GET;
    }

    location /files {
        root ./servers/evaluation/files;
        index no-index-here.html;
        autoindex on;
        allowed_methods GET;
    }

    location /private {
        root ./servers/evaluation/private;
        index no-index-here.html;
        autoindex off;
        allowed_methods GET;
    }

    location /uploads {
        root ./servers/evaluation/uploads;
        index no-index-here.html;
        autoindex on;
        allowed_methods GET POST DELETE;
        upload_dir ./servers/evaluation/uploads;
    }

    location /cgi {
        root ./servers/evaluation/cgi;
        index env.py;
        allowed_methods GET POST;
        cgi .py /usr/bin/python3;
    }

    location /redirect {
        root ./servers/evaluation/public;
        index index.html;
        allowed_methods GET;
        return 302 /;
    }

    location /get-only {
        root ./servers/evaluation/public;
        index index.html;
        allowed_methods GET;
    }

    location /static-post {
        root ./servers/evaluation/public;
        index index.html;
        allowed_methods GET POST;
    }
}

# Multiple-port proof: http://127.0.0.1:8081
server {
    listen 127.0.0.1:8081;
    server_name second.local;
    root ./servers/second-site;
    index index.html;
    allowed_methods GET;

    location / {
        root ./servers/second-site;
        index index.html;
        allowed_methods GET;
    }
}

