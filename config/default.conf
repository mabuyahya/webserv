server{
	listen 127.0.0.1:8080;
	server_name webserv.com;

	error_page 404 /html/error/404.html;
	error_page 500 /html/error/500.html;

	client_max_body_size 5m;

	location / {
		root /html/static;
		index index.html;
		allow_methods GET;
		autoindex off;
	}

	location /upload {
		root /html/upload;
		index index.html;
		storage /html/upload/storage;
		allow_methods GET POST DELETE;
	}

	location /cgi-bin {
		root /html/cgi-bin;
		cgi_pass /html/cgi-bin;
		allow_methods GET POST;
	}

	location /redirect {
		return 301 http://www.google.com;
	}
}
